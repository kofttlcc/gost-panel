# SQLite 輕量版 Docker Compose
# 無需 MySQL，後端 + 前端僅需約 100MB 記憶體
# 用法：docker compose -f docker-compose-lite.yml up -d
#
# ⚠️ 首次使用前：
#   1. 確保 /opt/gost-panel/data/gost.db 已存在（用遷移腳本產生）
#   2. 修改 .env 中的 JWT_SECRET

services:
  backend:
    image: koftt/springboot-backend:lite
    container_name: springboot-backend
    restart: unless-stopped
    environment:
      JWT_SECRET: ${JWT_SECRET}
      LOG_DIR: /app/logs
      MALLOC_ARENA_MAX: "1"
    ports:
      - "${BACKEND_PORT:-6365}:6365"
    volumes:
      - ${SQLITE_DATA_DIR:-/opt/gost-panel/data}:/app/data    # SQLite 資料庫持久化
      - backend_logs:/app/logs
    networks:
      - gost-network
    deploy:
      resources:
        limits:
          memory: 150m

  frontend:
    image: koftt/vite-frontend:latest
    container_name: vite-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-8082}:80" # 映射前端 Nginx 的 80 端口到本機 8082 端口供反代使用
    depends_on:
      - backend
    networks:
      - gost-network

volumes:
  backend_logs:
    name: backend_logs
    driver: local

networks:
  gost-network:
    name: gost-network
    driver: bridge

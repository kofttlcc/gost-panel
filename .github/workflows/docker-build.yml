name: Build and Push Images Based on Version

# 在这里定义统一版本号
env:
  VERSION: "latest"

on:
  push:
    branches:
      - main
      - beta
  workflow_dispatch:
    inputs:
      force_build:
        description: 'Force build all images'
        required: true
        type: boolean
        default: true

jobs:
  check-version:
    name: Check Version and Decide Build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ env.VERSION }}
      should_build: ${{ steps.check-tag.outputs.should_build }}
      should_build_gost: ${{ steps.check-tag.outputs.should_build_gost }}
      tag_exists: ${{ steps.check-tag.outputs.tag_exists }}
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Display version
        run: |
          echo "Current version: ${{ env.VERSION }}"

      - name: Check if tag exists and detect changes
        id: check-tag
        run: |
          FORCE_BUILD="${{ github.event.inputs.force_build }}"
          if [ "$FORCE_BUILD" = "true" ] || [ "${{ env.VERSION }}" = "latest" ]; then
            echo "Force build enabled or VERSION is latest. Will build all components."
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "should_build_gost=true" >> $GITHUB_OUTPUT
            if git rev-parse "${{ env.VERSION }}" >/dev/null 2>&1; then
              echo "tag_exists=true" >> $GITHUB_OUTPUT
            else
              echo "tag_exists=false" >> $GITHUB_OUTPUT
            fi
            exit 0
          fi

          if git rev-parse "${{ env.VERSION }}" >/dev/null 2>&1; then
            echo "Tag ${{ env.VERSION }} already exists"
            echo "tag_exists=true" >> $GITHUB_OUTPUT
            echo "should_build=false" >> $GITHUB_OUTPUT
            
            TAG_COMMIT=$(git rev-list -n 1 "${{ env.VERSION }}")
            if git diff --quiet --ignore-all-space --ignore-blank-lines $TAG_COMMIT HEAD -- go-gost/ 2>/dev/null; then
              echo "✅ GOST files unchanged since tag"
              echo "should_build_gost=false" >> $GITHUB_OUTPUT
            else
              echo "🔄 Detected changes in go-gost directory:"
              git diff --stat $TAG_COMMIT HEAD -- go-gost/ || true
              echo "should_build_gost=true" >> $GITHUB_OUTPUT
            fi
          else
            echo "Tag ${{ env.VERSION }} does not exist, will build all components"
            echo "should_build=true" >> $GITHUB_OUTPUT
            echo "should_build_gost=true" >> $GITHUB_OUTPUT
            echo "tag_exists=false" >> $GITHUB_OUTPUT
          fi

  build-gost:
    name: Build & Compress GOST Binary
    needs: check-version
    if: needs.check-version.outputs.should_build_gost == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Cache Go modules
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Install UPX
        run: |
          wget https://github.com/upx/upx/releases/download/v4.2.1/upx-4.2.1-amd64_linux.tar.xz
          tar -xf upx-4.2.1-amd64_linux.tar.xz
          sudo mv upx-4.2.1-amd64_linux/upx /usr/local/bin/
          rm -rf upx-4.2.1-amd64_linux*

      - name: Build GOST binary (AMD64)
        working-directory: ./go-gost
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o gost-amd64

      - name: Build GOST binary (ARM64)
        working-directory: ./go-gost
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o gost-arm64

      - name: Compress with UPX (AMD64)
        working-directory: ./go-gost
        run: |
          upx --best --lzma gost-amd64

      - name: Compress with UPX (ARM64)
        working-directory: ./go-gost
        run: |
          upx --best --lzma gost-arm64

      - name: Upload GOST AMD64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: gost-binary-amd64
          path: ./go-gost/gost-amd64

      - name: Upload GOST ARM64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: gost-binary-arm64
          path: ./go-gost/gost-arm64

  build-vite:
    name: Build & Push Vite Frontend
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Vite Docker images
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --push \
            -t koftt/vite-frontend:latest \
            -t koftt/vite-frontend:${VERSION} \
            ./vite-frontend

  build-java-lite:
    name: Build & Push Spring Boot Backend (SQLite Lite)
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push SQLite Lite Docker images
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --push \
            -f ./springboot-backend-lite/Dockerfile.lite \
            -t koftt/springboot-backend:lite \
            -t koftt/springboot-backend:${VERSION}-lite \
            ./springboot-backend-lite

  create-release:
    name: Create Release and Tag
    needs: [check-version, build-gost, build-vite, build-java-lite]
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js for Frontend
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build Frontend Static Files
        working-directory: ./vite-frontend
        run: |
          npm install --legacy-peer-deps
          npm run build
          mkdir -p ../artifacts
          tar -czf ../artifacts/frontend.tar.gz -C dist .

      - name: Download GOST AMD64 binary
        uses: actions/download-artifact@v4
        with:
          name: gost-binary-amd64
          path: ./artifacts/amd64

      - name: Download GOST ARM64 binary
        uses: actions/download-artifact@v4
        with:
          name: gost-binary-arm64
          path: ./artifacts/arm64

      - name: Rename binaries
        run: |
          mv ./artifacts/amd64/gost-amd64 ./artifacts/gost-amd64
          mv ./artifacts/arm64/gost-arm64 ./artifacts/gost-arm64

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          
          git tag -f "${VERSION}" ${{ github.sha }}
          git push -f origin "${VERSION}"
          
          COMMIT_MSG=$(git log -1 --pretty=format:"%s")
          COMMIT_AUTHOR=$(git log -1 --pretty=format:"%an")
          COMMIT_DATE=$(git log -1 --pretty=format:"%ai")
          
          if gh release view "${VERSION}" &>/dev/null; then
            echo "Release ${VERSION} exists. Updating..."
            gh release edit "${VERSION}" \
              --title "Release ${VERSION}" \
              --notes "## 📝 Commit Information
            - **Message**: ${COMMIT_MSG}
            - **Author**: ${COMMIT_AUTHOR}
            - **Date**: ${COMMIT_DATE}
            - **Commit**: [\`${GITHUB_SHA:0:7}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})"
          else
            echo "Creating new release ${VERSION}..."
            gh release create "${VERSION}" \
              --title "Release ${VERSION}" \
              --notes "## 📝 Commit Information
            - **Message**: ${COMMIT_MSG}
            - **Author**: ${COMMIT_AUTHOR}
            - **Date**: ${COMMIT_DATE}
            - **Commit**: [\`${GITHUB_SHA:0:7}\`](https://github.com/${{ github.repository }}/commit/${{ github.sha }})" \
              --repo ${{ github.repository }}
          fi
          
          echo "📤 上传前端静态文件..."
          gh release upload "${VERSION}" ./artifacts/frontend.tar.gz --clobber
          
          echo "📤 上传 GOST 二进制文件..."
          gh release upload "${VERSION}" ./artifacts/gost-amd64 --clobber
          gh release upload "${VERSION}" ./artifacts/gost-arm64 --clobber
          
          echo "📤 上传安装脚本..."
          gh release upload "${VERSION}" ./install.sh --clobber
          gh release upload "${VERSION}" ./panel_install.sh --clobber
          gh release upload "${VERSION}" ./upgrade_lite.sh --clobber
          
          echo "📤 上传 Docker Compose 配置文件..."
          gh release upload "${VERSION}" ./docker-compose-v4.yml --clobber
          gh release upload "${VERSION}" ./docker-compose-lite.yml --clobber
          
          echo "📤 上传 SQLite 迁移脚本..."
          gh release upload "${VERSION}" ./springboot-backend-lite/migrate_mysql_to_sqlite.sh --clobber
          
          echo "📤 上传数据库初始化文件..."
          gh release upload "${VERSION}" ./gost.sql --clobber
          
          echo "✅ 所有文件已上传到 Release ${VERSION}"

  update-release-gost:
    name: Update GOST Binaries in Release
    needs: [check-version, build-gost]
    if: needs.check-version.outputs.should_build == 'false' && needs.check-version.outputs.should_build_gost == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Download GOST AMD64 binary
        uses: actions/download-artifact@v4
        with:
          name: gost-binary-amd64
          path: ./artifacts/amd64

      - name: Download GOST ARM64 binary
        uses: actions/download-artifact@v4
        with:
          name: gost-binary-arm64
          path: ./artifacts/arm64

      - name: Rename binaries
        run: |
          mv ./artifacts/amd64/gost-amd64 ./artifacts/gost-amd64
          mv ./artifacts/arm64/gost-arm64 ./artifacts/gost-arm64

      - name: Update GOST binaries in Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          echo "🔄 更新 Release ${VERSION} 中的 GOST 二进制文件..."
          gh release upload "${VERSION}" ./artifacts/gost-amd64 --clobber
          gh release upload "${VERSION}" ./artifacts/gost-arm64 --clobber
          echo "✅ GOST 二进制文件更新完成！"

  update-release-files:
    name: Update Release Files Only
    needs: check-version
    if: needs.check-version.outputs.tag_exists == 'true' && needs.check-version.outputs.should_build == 'false' && needs.check-version.outputs.should_build_gost == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Update Release Files
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          echo "📤 更新 Release ${VERSION} 中的脚本和配置文件..."
          
          gh release upload "${VERSION}" ./install.sh --clobber
          gh release upload "${VERSION}" ./panel_install.sh --clobber
          gh release upload "${VERSION}" ./upgrade_lite.sh --clobber
          
          gh release upload "${VERSION}" ./docker-compose-v4.yml --clobber
          gh release upload "${VERSION}" ./docker-compose-lite.yml --clobber

          gh release upload "${VERSION}" ./springboot-backend-lite/migrate_mysql_to_sqlite.sh --clobber
          
          gh release upload "${VERSION}" ./gost.sql --clobber
          
          echo "✅ 文件更新完成！"